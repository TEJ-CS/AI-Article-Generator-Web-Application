<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Article History</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-950 via-gray-900 to-black text-white min-h-screen">

<div class="max-w-7xl mx-auto px-6 py-10">

<div class="flex justify-between items-center mb-10">

<div>

<h1 class="text-5xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
📜 Article History
</h1>

<p class="text-gray-400 mt-2">
All generated articles
</p>

</div>

<a href="/"
class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-xl transition shadow-lg">

← Back Home

</a>

</div>

{% if articles %}

{% for a in articles %}

<div class="bg-white/10 backdrop-blur-xl border border-white/10 p-8 rounded-[25px] mb-8 shadow-xl hover:-translate-y-1 transition duration-300">

<h2 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
{{ a.topic }}
</h2>

<p class="text-gray-400 text-sm mt-2">
{{ a.created_at.strftime('%d %b %Y %I:%M %p') }}
</p>

<hr class="my-5 border-white/10">

<p class="text-gray-300 whitespace-pre-line leading-8">
{{ a.content }}
</p>

</div>

{% endfor %}

{% else %}

<div class="bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-12 text-center">

<h2 class="text-3xl font-bold text-gray-300">
No Articles Yet
</h2>

<p class="text-gray-400 mt-3">
Generate your first article to see history here.
</p>

</div>

{% endif %}

</div>

</body>
</html>
