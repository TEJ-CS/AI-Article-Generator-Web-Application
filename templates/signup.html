<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - AI Content Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-cover bg-center"
style="background-image:url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1600&q=80');">

<div class="absolute inset-0 bg-black/75"></div>

<div class="relative min-h-screen flex items-center justify-center px-4">

<div class="w-full max-w-md bg-white/10 backdrop-blur-2xl border border-white/10 rounded-[30px] p-10 shadow-2xl">

<div class="text-center">

<h1 class="text-5xl font-bold text-white">
Create Account 🚀
</h1>

<p class="text-gray-300 mt-3">
Start generating AI articles today
</p>

</div>

<form method="POST" class="mt-10">

<input
type="text"
name="username"
placeholder="Username"
required
class="w-full p-4 rounded-2xl bg-black/30 border border-white/10 text-white placeholder-gray-400 focus:ring-2 focus:ring-green-400 outline-none mb-5">

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full p-4 rounded-2xl bg-black/30 border border-white/10 text-white placeholder-gray-400 focus:ring-2 focus:ring-green-400 outline-none">

<button
type="submit"
class="mt-6 w-full bg-gradient-to-r from-green-500 to-emerald-600 py-4 rounded-2xl text-lg font-semibold hover:scale-105 transition duration-300 shadow-xl">

Create Account

</button>

</form>

<div class="text-center mt-8">

<p class="text-gray-300">
Already have an account?
</p>

<a href="/login"
class="inline-block mt-3 text-green-400 font-semibold hover:text-green-300 transition">

Login →

</a>

</div>

</div>

</div>

</body>
</html>
